# ─────────────────────────────────────────────────────────────────────────────
# maxwell_waveguide.toml
#
# Configuration for running the solver with the analytic TE rectangular-
# waveguide mode supplied as SBP-SAT boundary data on every physical face.
# This is the convergence-test scenario (documentation.tex §8): the scheme
# is driven by the exact solution on every face, so the numerical state
# converges to the analytic at the scheme's design rate and any regression
# in the SBP closures, face SATs, or edge/corner additivity shows up as a
# rate drop.
#
# Usage (single run, from src/):
#     mpirun -np 4 ./maxwell_system maxwell_waveguide.toml
# For the full four-configuration convergence study across resolutions,
# use scripts/convergence_test.py, which generates its own TOML templates
# but sets the same physics as this file.
#
# Notes on the configuration:
#   * Unit-cube domain [0, 1]^3 — the waveguide mode lives natively here.
#   * All six faces non-periodic: exercises the full SBP-SAT machinery
#     (6 faces + 12 edges + 8 corners). Flipping any periodic_* to true
#     (or all three, for the interior-only reference) still produces a
#     valid convergence test when (l, m, n) are even — the (2, 2, 2)
#     default is periodic on the unit cube.
#   * Uniform vacuum material (ε = μ = 1, σ = 0) is required: the
#     analytic is the vacuum Maxwell solution, and spatially-varying ε
#     would make it no longer a solution.
# ─────────────────────────────────────────────────────────────────────────────

[grid]
nx = 48
ny = 48
nz = 48
x0 = 0.0          # unit-cube domain [0, 1]^3 — where the TE waveguide mode
y0 = 0.0          # lives natively (PEC/periodic at integer multiples)
z0 = 0.0
xn = 1.0
yn = 1.0
zn = 1.0
# All faces physical → every face carries an SBP-SAT penalty driven by the
# analytic. Flip any combination to `true` to run a partial-physical config
# (fully_periodic / z_physical / yz_physical); the (2,2,2) mode is also
# periodic on the unit cube so the same reference still applies.
periodic_x = false
periodic_y = false
periodic_z = false

[solver]
ghost_size       = 3        # minimum for SBP-4-2 and 5th-order Kreiss–Oliger
cfl_factor       = 0.2      # six-face SAT: corners stack three penalties, tight CFL
max_iterations   = 161      # ~one full period of the (2,2,2) mode (T = 1/√3 ≈ 0.577)
output_every     = 16       # 10 HDF5 output groups over the run
checkpoint_every = 0        # short run — no checkpoints
max_checkpoints  = 2
recover          = false
use_dissipation  = false    # convergence tests rely on the smooth PDE solution
diss_coeff       = 0.1
tau              = 1.0      # SBP-SAT penalty strength (>= 0.5 for stability)

[physics]
kappa_D = 0.1    # constraint-damping coefficient for div D
kappa_B = 0.1    # constraint-damping coefficient for div B
# The analytic has Ψ_D = Ψ_B = 0 identically, so these only damp the
# residual numerical divergence that the SBP stencil produces.

[source]
type = "te_waveguide_mode"   # analytic routed as SAT data on every physical face

# [source.plane_wave] and [source.gaussian_beam] are still parsed by the
# driver (so switching sources is a one-line `type` edit); the values
# here are plausible defaults but unused with type = "te_waveguide_mode".
[source.plane_wave]
ax     = 1.0
ay     = 1.0
k      = 4.0
bump_a = 0.0
bump_b = 1.0

[source.gaussian_beam]
w0        = 0.3
z_waist   = 0.5
k         = 4.0
amplitude = 1.0
ramp_a    = 0.0
ramp_b    = 1.0

[source.te_waveguide_mode]
# TE rectangular-waveguide mode numbers. Dispersion: ω² = π²(l² + m² + n²).
# Choose (l, m, n) even → the analytic is periodic on the unit cube, so the
# same reference serves both periodic and fully-physical configurations.
l = 2   # transverse standing-wave order in x (>= 1)
m = 2   # transverse standing-wave order in y (>= 1)
n = 2   # longitudinal (propagation-direction) order in z (>= 1)

[material]
epsilon_type = "uniform"    # required: the analytic is a vacuum Maxwell solution

[material.background]
epsilon = 1.0               # vacuum
mu      = 1.0               # vacuum
sigma   = 0.0               # lossless

# [material.elliptical] is not read when epsilon_type = "uniform", so
# there is no need to supply it. Add one if you want to document the
# baseline parameters for the lens-demo TOML side by side.
